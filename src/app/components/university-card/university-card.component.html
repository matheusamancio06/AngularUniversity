<div class="card h-100 shadow-sm border-0 university-card" (click)="openWebsite(primaryWebsite)" style="cursor:pointer">
  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h6 class="card-title fw-bold mb-0 flex-grow-1 me-2">{{ university.name }}</h6>
      <button class="btn btn-link p-0 text-warning fs-5" (click)="toggleFavorite($event)" [title]="isFavorite ? 'Remover dos favoritos' : 'Adicionar aos favoritos'">
        <i class="bi" [class.bi-star-fill]="isFavorite" [class.bi-star]="!isFavorite"></i>
      </button>
    </div>

    <div class="mt-auto">
      <p class="mb-1 small text-muted">
        <i class="bi bi-geo-alt-fill me-1 text-danger"></i>
        <strong>País:</strong> {{ university.country }}
      </p>
      <p class="mb-1 small text-muted">
        <i class="bi bi-globe me-1 text-primary"></i>
        <strong>Domínio:</strong> {{ primaryDomain }}
      </p>
      <p class="mb-0 small" *ngIf="primaryWebsite">
        <i class="bi bi-link-45deg me-1 text-success"></i>
        <a [href]="primaryWebsite" target="_blank" rel="noopener" class="text-truncate d-inline-block" style="max-width:200px" (click)="$event.stopPropagation()">
          {{ primaryWebsite }}
        </a>
      </p>
    </div>
  </div>

  <div class="card-footer bg-transparent border-0 pt-0">
    <button class="btn btn-outline-primary btn-sm w-100" (click)="openWebsite(primaryWebsite); $event.stopPropagation()" *ngIf="primaryWebsite">
      <i class="bi bi-box-arrow-up-right me-1"></i>Abrir site oficial
    </button>
  </div>
</div>
