<div class="row g-3 mb-4">
  <div class="col-12 col-sm-4">
    <div class="card border-0 shadow-sm text-center bg-primary text-white">
      <div class="card-body">
        <i class="bi bi-building fs-2"></i>
        <h4 class="fw-bold mb-0 mt-1">{{ totalCount }}</h4>
        <small>Universidades encontradas</small>
      </div>
    </div>
  </div>
  <div class="col-12 col-sm-4">
    <div class="card border-0 shadow-sm text-center bg-success text-white">
      <div class="card-body">
        <i class="bi bi-globe2 fs-2"></i>
        <h4 class="fw-bold mb-0 mt-1">{{ uniqueDomains }}</h4>
        <small>Domínios únicos</small>
      </div>
    </div>
  </div>
  <div class="col-12 col-sm-4">
    <div class="card border-0 shadow-sm text-center bg-warning text-dark">
      <div class="card-body">
        <i class="bi bi-star-fill fs-2"></i>
        <h4 class="fw-bold mb-0 mt-1">{{ favoritesCount }}</h4>
        <small>Universidades favoritas</small>
      </div>
    </div>
  </div>
</div>
